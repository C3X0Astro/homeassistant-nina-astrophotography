blueprint:
  name: "N.I.N.A. – Session Startup"
  description: >
    Performs a full observatory startup routine at a configurable time or trigger.
    Unparks the mount, enables tracking, cools the camera to a target temperature,
    optionally opens the dome, and then loads and starts an imaging sequence.
  domain: automation
  source_url: https://github.com/christian-photo/ninaAPI
  input:
    trigger_time:
      name: Start Time
      description: Time of day to begin the startup routine (leave blank to trigger manually).
      default: "21:00:00"
      selector:
        time:

    camera_target_temp:
      name: Camera Target Temperature (°C)
      description: Temperature to cool the sensor to before starting.
      default: -10
      selector:
        number:
          min: -30
          max: 0
          unit_of_measurement: "°C"

    cooling_ramp_minutes:
      name: Cooling Ramp Time (minutes)
      description: How many minutes to take to ramp to the target temperature.
      default: 15
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: min

    cooling_wait_minutes:
      name: Wait After Cooling (minutes)
      description: Additional wait after reaching target temp before starting sequence.
      default: 5
      selector:
        number:
          min: 0
          max: 30
          unit_of_measurement: min

    open_dome:
      name: Open Dome
      description: Open the dome shutter before starting.
      default: false
      selector:
        boolean:

    sequence_path:
      name: Sequence File Path
      description: >
        Full Windows path to the .ninasequence file to load and start.
        Leave blank to start whatever is already loaded.
      default: ""
      selector:
        text:

    notify_device:
      name: Notify Device (optional)
      description: Mobile device to send a notification to when the session starts.
      default: ""
      selector:
        text:

trigger:
  - platform: time
    at: !input trigger_time

condition: []

action:
  - alias: "Unpark mount and enable tracking"
    service: nina_astrophotography.mount_unpark

  - delay: "00:00:05"

  - service: nina_astrophotography.mount_set_tracking
    data:
      enabled: true

  - alias: "Conditionally open dome"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ open_dome }}"
        sequence:
          - service: nina_astrophotography.dome_open
          - delay: "00:00:30"

  - alias: "Start camera cooling"
    service: nina_astrophotography.camera_cool
    data:
      temperature: !input camera_target_temp
      minutes: !input cooling_ramp_minutes

  - alias: "Wait for cooling ramp + extra buffer"
    delay:
      minutes: "{{ cooling_ramp_minutes | int + cooling_wait_minutes | int }}"

  - alias: "Load sequence if path provided"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ sequence_path != '' }}"
        sequence:
          - service: nina_astrophotography.sequence_load
            data:
              path: !input sequence_path
          - delay: "00:00:03"

  - service: nina_astrophotography.sequence_start

  - alias: "Send notification if device configured"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ notify_device != '' }}"
        sequence:
          - service: "notify.{{ notify_device }}"
            data:
              title: "🔭 N.I.N.A. Session Started"
              message: >
                Imaging sequence started.
                Camera at {{ states('sensor.camera_temperature') }}°C.

mode: single
